<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Thinkcap Advisors CRM</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-wrap">
      <!-- Replace src with your logo file e.g. src="thinkcap-logo.png" -->
      <div class="logo-placeholder" id="logo-area">
        <div class="logo-mark">TA</div>
        <div class="logo-text-wrap">
          <div class="logo-name">Thinkcap</div>
          <div class="logo-sub">Advisors CRM</div>
        </div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section">Main</div>
      <a class="nav-item" id="nv-dashboard"   onclick="go('dashboard')">
        <svg class="ni" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <div class="nav-section">Sales</div>
      <a class="nav-item" id="nv-leads"       onclick="go('leads')">
        <svg class="ni" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Leads <span class="nav-badge" id="nb-leads">0</span>
      </a>
      <a class="nav-item" id="nv-accounts"    onclick="go('accounts')">
        <svg class="ni" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Accounts
      </a>
      <a class="nav-item" id="nv-contacts"    onclick="go('contacts')">
        <svg class="ni" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Contacts
      </a>
      <div class="nav-section">Tools</div>
      <a class="nav-item" id="nv-reminders"   onclick="go('reminders')">
        <svg class="ni" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Reminders <span class="nav-badge nav-badge-red" id="nb-reminders" style="display:none">0</span>
      </a>
      <a class="nav-item" id="nv-competitors" onclick="go('competitors')">
        <svg class="ni" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Competitors
      </a>
      <div class="nav-section" style="margin-top:auto">System</div>
      <a class="nav-item" id="nv-settings"    onclick="go('settings')">
        <svg class="ni" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">
    <!-- TOP BAR -->
    <header class="topbar-global">
      <div class="tg-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <span class="tg-module-name" id="tg-module">Dashboard</span>
      </div>
      <div class="tg-center">
        <div class="gsearch-wrap" id="gsearch-wrap">
          <svg viewBox="0 0 24 24" class="gsearch-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="gsearch-inp" id="gsearch" placeholder="Search leads, contacts, accounts…" oninput="globalSearch(this.value)" onfocus="showGSD()" onblur="setTimeout(hideGSD,200)" autocomplete="off"/>
          <div class="gsd" id="gsd" style="display:none"></div>
        </div>
      </div>
      <div class="tg-right">
        <div class="tg-bell" id="tg-bell" onclick="checkAndShowReminder()" title="View reminders" style="position:relative;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg);border:1px solid var(--border)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="bell-badge" style="display:none;position:absolute;top:0;right:0;width:16px;height:16px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid white"></span>
        </div>
        <div class="tg-avatar">TA</div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="main" id="main"></main>
  </div>

  <!-- PANEL OVERLAY -->
  <div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>
</div>
<script src="app.js"></script>
</body>
</html>
